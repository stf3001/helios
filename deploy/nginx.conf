# HELIOS — reverse proxy (jalon 9 : SSL Let's Encrypt via certbot)
server {
    listen 80;
    server_name helios.example.fr;  # <- domaine à définir

    root /var/www/helios;           # build du front
    index index.html;

    location /api/ {
        proxy_pass http://127.0.0.1:8000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
    location / {
        try_files $uri $uri/ /index.html;
    }
}
